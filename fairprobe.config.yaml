# FairProbe Configuration File
# Replace values according to your organization

company: "Demo Company"
domain: "employment"

# Target AI endpoint (for real deployment)
# For demo, this is handled internally
target_ai:
  endpoint: ""
  auth_token: ""
  method: "POST"

# Fields your AI receives per candidate
candidate_fields:
  - name: "name"
    bias_dimension: "name_origin"
  - name: "age"
    bias_dimension: "age_group"
  - name: "ethnicity"
    bias_dimension: "ethnicity"
  - name: "experience"
    bias_dimension: null
  - name: "gpa"
    bias_dimension: null

# Dimensions to audit
audit_dimensions:
  - name_origin
  - age_group
  - ethnicity

# Bias thresholds (percentage disparity)
thresholds:
  high_bias: 30
  medium_bias: 15

# Database configuration
database:
  type: "sqlite"
  path: "./fairprobe.db"

# AI configuration
ai:
  provider: "gemini"
  api_key: ""
  model: "gemini-1.5-flash"

# Reporting
reporting:
  domain: "employment"
  jurisdiction: "US"
  schedule: "weekly"

# Demo settings
demo:
  candidates_count: 500
  candidates_cache: "./demo_candidates.json"
  biased_names:
    - "Mohammed"
    - "Fatima"
    - "Lakisha"
    - "Darius"
    - "Jamal"
    - "Aisha"
  age_bias_threshold: 40
  name_bias_penalty: 30
  age_bias_penalty: 20


