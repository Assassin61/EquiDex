# Google Cloud Build — FairProbe Backend
# Trigger: push to main branch
# Deploys to Cloud Run (us-central1)
#
# One-time setup:
#   gcloud secrets create GROQ_API_KEY --data-file=- <<< "your_key"
#   gcloud secrets create GEMINI_API_KEY --data-file=- <<< "your_key"
#   gcloud secrets add-iam-policy-binding GROQ_API_KEY \
#     --member="serviceAccount:PROJECT_NUMBER-compute@developer.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"

substitutions:
  _SERVICE_NAME: fairprobe-backend
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/fairprobe-backend

steps:
  # Step 1 — Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - $_IMAGE:$SHORT_SHA
      - -t
      - $_IMAGE:latest
      - .

  # Step 2 — Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - $_IMAGE

  # Step 3 — Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_IMAGE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=GROQ_API_KEY=GROQ_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest

images:
  - $_IMAGE:$SHORT_SHA
  - $_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
